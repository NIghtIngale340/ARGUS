input {
  beats {
    port => 5044
  }
}

filter {
  if ![message] or [message] =~ /^\s*$/ {
    drop { }
  }

  mutate {
    rename => { "message" => "[event][original]" }
    add_field => { "[event][dataset]" => "argus.raw_logs" }
  }

  if [event][original] =~ /^(?:GET \/health|GET \/ready|POST \/metrics)$/ {
    drop { }
  }

  mutate {
    remove_field => ["host", "agent", "ecs", "input", "tags"]
  }
}

output {
  kafka {
    bootstrap_servers => "kafka:9092"
    topic_id => "argus.raw-logs"
    codec => json
  }
  stdout { codec => rubydebug }
}